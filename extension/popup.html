<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guardrail</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap");

      :root {
        --bg-0: #fff6e8;
        --bg-1: #f4e4cd;
        --surface: #fffdf8;
        --brown-dark: #3b2a1e;
        --brown-mid: #6b4a35;
        --brown-light: #8c6a50;
        --gold: #d9a441;
        --gold-dark: #b58322;
        --border: #ead7c4;
        --overlay: rgba(217, 164, 65, 0.12);
        --success: #3a7a4a;
        --warning: #c78a1d;
        --danger: #b23b2f;
        --success-bg: #e7f5ea;
        --warning-bg: #fff4dc;
        --danger-bg: #fde7e3;
        --success-text: #2b5f38;
        --warning-text: #8a5b0f;
        --danger-text: #8f2a22;
        --shadow: 0 18px 40px rgba(77, 56, 36, 0.18);
        --page-bg:
          radial-gradient(circle at 12% 8%, #fff4c7 0, transparent 36%),
          radial-gradient(circle at 88% 16%, #f5e2c3 0, transparent 34%),
          linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 380px;
        min-height: 510px;
        background: var(--page-bg);
        color: var(--brown-dark);
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }

      .popup {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        padding: 16px;
      }

      .header {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 0.85rem 0.9rem;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .brand-icon {
        width: 30px;
        height: 30px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.7);
        display: grid;
        place-items: center;
      }

      .brand {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.2px;
        font-family: "Playfair Display", serif;
        color: var(--brown-dark);
      }

      .subtitle {
        font-size: 0.72rem;
        color: var(--brown-light);
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }

      .live-badge {
        align-self: flex-start;
        margin-top: 0.25rem;
        font-size: 0.68rem;
        background: var(--success-bg);
        color: var(--success-text);
        border: 1px solid var(--success);
        border-radius: 999px;
        padding: 0.2rem 0.5rem;
        font-weight: 600;
      }

      .label {
        font-size: 0.7rem;
        color: var(--brown-light);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      textarea {
        width: 100%;
        min-height: 120px;
        resize: vertical;
        padding: 0.7rem 0.75rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--brown-dark);
        font-size: 13px;
        line-height: 1.4;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4);
      }

      textarea:focus {
        outline: 2px solid rgba(217, 164, 65, 0.28);
        border-color: var(--gold);
      }

      textarea::placeholder {
        color: var(--brown-light);
      }

      .btn {
        width: 100%;
        padding: 0.6rem 0.8rem;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          background 0.15s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        transform: none;
      }

      .btn.primary {
        background: linear-gradient(135deg, #f3c96b 0%, #d9a441 100%);
        color: var(--brown-dark);
        box-shadow: 0 8px 18px rgba(92, 62, 30, 0.16);
      }

      .btn.primary:hover {
        background: linear-gradient(135deg, #f5cf7b 0%, #deab4f 100%);
      }

      .btn.secondary {
        border-color: var(--gold);
        color: var(--brown-dark);
        background: transparent;
      }

      .btn.secondary:hover {
        background: var(--overlay);
      }

      .hidden {
        display: none;
      }

      .result {
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .status-label {
        font-size: 12px;
        color: var(--brown-light);
      }

      .status-badge {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        border: 1px solid transparent;
      }

      .status-idle {
        background: var(--overlay);
        color: var(--brown-mid);
        border-color: var(--border);
      }

      .status-safe {
        background: var(--success-bg);
        color: var(--success-text);
        border-color: var(--success);
      }

      .status-flagged {
        background: var(--warning-bg);
        color: var(--warning-text);
        border-color: var(--warning);
      }

      .status-blocked {
        background: var(--danger-bg);
        color: var(--danger-text);
        border-color: var(--danger);
      }

      .result-detail {
        font-size: 12px;
        color: var(--brown-mid);
        line-height: 1.4;
      }

      .detail-title {
        font-weight: 600;
        margin-bottom: 6px;
        letter-spacing: 0.03em;
      }

      .detail-text {
        background: #fff8ef;
        border-radius: 8px;
        padding: 8px;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        color: var(--brown-dark);
      }
    </style>
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="brand-row">
          <span class="brand-icon" aria-hidden="true">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 2L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 2Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <div class="brand">Underdog Guardrail</div>
        </div>
        <div class="subtitle">Prompt Safety</div>
        <div class="live-badge">Live · Monitoring</div>
      </header>

      <label class="label" for="promptInput">Prompt</label>
      <textarea
        id="promptInput"
        placeholder="Paste the prompt you want to validate..."
      ></textarea>

      <button class="btn primary" id="validateBtn" type="button">
        Validate Prompt
      </button>

      <section class="result" id="resultArea" aria-live="polite">
        <div class="status-row">
          <span class="status-label">Status</span>
          <span class="status-badge status-idle" id="statusBadge"
            >Not Checked</span
          >
        </div>
        <div class="result-detail" id="resultHint">
          Run validation to see a safety result.
        </div>
        <div class="result-detail hidden" id="safeDetail">
          <div class="detail-title">SAFE</div>
          <div class="detail-text">No issues detected.</div>
        </div>
        <div class="result-detail hidden" id="flaggedDetail">
          <div class="detail-title">FLAGGED - Guardrail Details</div>
          <div class="detail-text" id="sanitizedText"></div>
        </div>
        <div class="result-detail hidden" id="blockedDetail">
          <div class="detail-title">BLOCKED - Reason</div>
          <div class="detail-text" id="blockedReason"></div>
        </div>
      </section>

      <button class="btn secondary hidden" id="injectBtn" type="button">
        Inject into Chat
      </button>
    </main>

    <script src="src/popup.js"></script>
  </body>
</html>
